server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable buffering for SSE (Server-Sent Events)
    proxy_buffering off;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE connections
        proxy_set_header   Connection        '';
        proxy_cache_bypass $http_upgrade;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy health check to the backend
    location = /health {
        proxy_pass http://api:3001/health;
    }

    # Serve static files; fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
